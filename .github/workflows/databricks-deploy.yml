name: Deploy Databricks Notebooks

# Triggers on push to main when any notebook changes
on:
  push:
    branches: [main]
    paths: ['databricks/*.ipynb']
  workflow_dispatch:   # allows manual trigger from GitHub Actions UI

env:
  DATABRICKS_HOST:                     https://adb-7405614242013965.5.azuredatabricks.net
  DATABRICKS_TOKEN:                    ${{ secrets.DATABRICKS_TOKEN }}
  WORKSPACE_PATH:                      /Users/baoshenyi7768@outlook.com/notebooks
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24:  true

jobs:
  deploy:
    name: Deploy notebooks to Databricks workspace
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout main branch (contains databricks/*.ipynb)
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Install legacy Databricks CLI 0.17.7 — last version using simple PAT token auth
      #    (0.18+ switched to unified auth which tries Azure OAuth on GitHub runners)
      - name: Install Databricks CLI
        run: pip install databricks-cli==0.17.7

      # 3. Configure CLI authentication — write ~/.databrickscfg directly (non-interactive)
      - name: Configure Databricks CLI
        run: |
          printf "[DEFAULT]\nhost = %s\ntoken = %s\n" "$DATABRICKS_HOST" "$DATABRICKS_TOKEN" > ~/.databrickscfg
          echo "✅ Databricks CLI configured"

      # 4. Ensure the target workspace folder exists
      - name: Create workspace folder if missing
        run: |
          databricks workspace mkdirs "$WORKSPACE_PATH"
          echo "✅ Workspace folder ready: $WORKSPACE_PATH"

      # 5. Deploy all notebooks from databricks/ to workspace
      - name: Deploy all notebooks
        run: |
          for notebook in databricks/*.ipynb; do
            name=$(basename "$notebook" .ipynb)
            echo "Deploying $name ..."
            databricks workspace import \
              --format JUPYTER \
              --overwrite \
              "$WORKSPACE_PATH/$name" \
              "$notebook"
            echo "  ✅ $name → $WORKSPACE_PATH/$name"
          done

      # 6. Confirm — list deployed notebooks
      - name: Verify deployment
        run: |
          echo "── Notebooks in $WORKSPACE_PATH ──"
          databricks workspace ls "$WORKSPACE_PATH"
