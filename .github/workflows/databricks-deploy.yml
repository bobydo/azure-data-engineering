name: Deploy Databricks Notebooks

# Triggers on push to main when any notebook changes
on:
  push:
    branches: [main]
    paths: ['databricks/*.ipynb']
  workflow_dispatch:   # allows manual trigger from GitHub Actions UI

env:
  DATABRICKS_HOST:                     https://adb-7405614242013965.5.azuredatabricks.net
  WORKSPACE_PATH:                      /Users/baoshenyi7768@outlook.com/notebooks
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24:  true

jobs:
  deploy:
    name: Deploy notebooks to Databricks workspace
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout main branch (contains databricks/*.ipynb)
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Upload all notebooks via Databricks REST API (no CLI — avoids auth version issues)
      - name: Deploy all notebooks
        env:
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import os, base64, json, glob, sys
          import urllib.request, urllib.error

          HOST           = os.environ['DATABRICKS_HOST']
          TOKEN          = os.environ['DATABRICKS_TOKEN']
          WORKSPACE_PATH = os.environ['WORKSPACE_PATH']
          HEADERS        = {'Authorization': f'Bearer {TOKEN}', 'Content-Type': 'application/json'}

          def api_post(endpoint, payload):
              req = urllib.request.Request(
                  f'{HOST}/api/2.0/{endpoint}',
                  data=json.dumps(payload).encode(),
                  headers=HEADERS,
                  method='POST'
              )
              try:
                  with urllib.request.urlopen(req) as r:
                      return json.load(r)
              except urllib.error.HTTPError as e:
                  print(f'HTTP {e.code}: {e.read().decode()}', file=sys.stderr)
                  sys.exit(1)

          # Create workspace folder
          api_post('workspace/mkdirs', {'path': WORKSPACE_PATH})
          print(f'Workspace folder ready: {WORKSPACE_PATH}')

          # Upload each notebook
          notebooks = sorted(glob.glob('databricks/*.ipynb'))
          for nb in notebooks:
              name = os.path.splitext(os.path.basename(nb))[0]
              with open(nb, 'rb') as f:
                  content = base64.b64encode(f.read()).decode()
              api_post('workspace/import', {
                  'path':      f'{WORKSPACE_PATH}/{name}',
                  'format':    'JUPYTER',
                  'content':   content,
                  'overwrite': True
              })
              print(f'  OK {name}')

          print(f'\n{len(notebooks)} notebooks deployed to {WORKSPACE_PATH}')
          PYEOF

      # 3. Confirm — list deployed notebooks
      - name: Verify deployment
        env:
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          echo "Notebooks in $WORKSPACE_PATH:"
          curl -sf "${DATABRICKS_HOST}/api/2.0/workspace/list?path=${WORKSPACE_PATH}" \
            -H "Authorization: Bearer $DATABRICKS_TOKEN" | \
            python3 -c "
          import sys, json
          for obj in json.load(sys.stdin).get('objects', []):
              print(' ', obj['path'].split('/')[-1])
          "
