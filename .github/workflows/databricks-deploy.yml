name: Deploy Databricks Notebooks

# Triggers on push to main when any notebook or library changes
on:
  push:
    branches: [main]
    paths:
      - 'databricks/*.ipynb'
      - 'databricks/lib/**'
  workflow_dispatch:   # allows manual trigger from GitHub Actions UI

env:
  DATABRICKS_HOST:                     https://adb-7405614242013965.5.azuredatabricks.net
  WORKSPACE_PATH:                      /Users/baoshenyi7768@outlook.com/notebooks
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24:  true

jobs:
  deploy:
    name: Deploy notebooks to Databricks workspace
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout main branch
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Deploy notebooks + lib/ via Databricks REST API
      - name: Deploy notebooks and library
        env:
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import os, base64, json, glob, sys
          import urllib.request, urllib.error

          HOST           = os.environ['DATABRICKS_HOST']
          TOKEN          = os.environ['DATABRICKS_TOKEN']
          WORKSPACE_PATH = os.environ['WORKSPACE_PATH']
          HEADERS        = {'Authorization': f'Bearer {TOKEN}', 'Content-Type': 'application/json'}

          def api_post(endpoint, payload):
              req = urllib.request.Request(
                  f'{HOST}/api/2.0/{endpoint}',
                  data=json.dumps(payload).encode(),
                  headers=HEADERS,
                  method='POST'
              )
              try:
                  with urllib.request.urlopen(req) as r:
                      return json.load(r)
              except urllib.error.HTTPError as e:
                  print(f'HTTP {e.code}: {e.read().decode()}', file=sys.stderr)
                  sys.exit(1)

          # ── Create workspace folders ───────────────────────────────────────
          for folder in [
              WORKSPACE_PATH,
              f'{WORKSPACE_PATH}/lib',
              f'{WORKSPACE_PATH}/lib/bobydo',
          ]:
              api_post('workspace/mkdirs', {'path': folder})
          print(f'Workspace folders ready under: {WORKSPACE_PATH}')

          # ── Deploy notebooks (.ipynb) ──────────────────────────────────────
          notebooks = sorted(glob.glob('databricks/*.ipynb'))
          for nb in notebooks:
              name = os.path.splitext(os.path.basename(nb))[0]
              with open(nb, 'rb') as f:
                  content = base64.b64encode(f.read()).decode()
              api_post('workspace/import', {
                  'path':      f'{WORKSPACE_PATH}/{name}',
                  'format':    'JUPYTER',
                  'content':   content,
                  'overwrite': True
              })
              print(f'  notebook: {name}')

          # ── Deploy library (.py files) ─────────────────────────────────────
          py_files = sorted(glob.glob('databricks/lib/**/*.py', recursive=True))
          for py in py_files:
              # e.g. databricks/lib/bobydo/adls_auth.py
              #   → /Users/.../notebooks/lib/bobydo/adls_auth.py
              rel  = py.replace('databricks/', '', 1)   # lib/bobydo/adls_auth.py
              dest = f'{WORKSPACE_PATH}/{rel}'
              with open(py, 'rb') as f:
                  content = base64.b64encode(f.read()).decode()
              api_post('workspace/import', {
                  'path':      dest,
                  'format':    'SOURCE',
                  'language':  'PYTHON',
                  'content':   content,
                  'overwrite': True
              })
              print(f'  lib:      {rel}')

          print(f'\n{len(notebooks)} notebooks, {len(py_files)} lib files deployed')
          PYEOF

      # 3. Confirm deployment
      - name: Verify deployment
        env:
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          echo "── Notebooks ──"
          curl -sf "${DATABRICKS_HOST}/api/2.0/workspace/list?path=${WORKSPACE_PATH}" \
            -H "Authorization: Bearer $DATABRICKS_TOKEN" | \
            python3 -c "
          import sys, json
          for o in json.load(sys.stdin).get('objects', []):
              print(' ', o['path'].split('/')[-1])
          "
          echo "── lib/ ──"
          curl -sf "${DATABRICKS_HOST}/api/2.0/workspace/list?path=${WORKSPACE_PATH}/lib" \
            -H "Authorization: Bearer $DATABRICKS_TOKEN" | \
            python3 -c "
          import sys, json
          for o in json.load(sys.stdin).get('objects', []):
              print(' ', o['path'].split('/')[-1])
          "
