name: Deploy ADF to Azure

# Triggers when ADF Studio clicks "Publish" — which pushes ARM template to adf_publish branch
on:
  push:
    branches:
      - adf_publish   # ADF Studio writes here on every Publish click

env:
  RESOURCE_GROUP:   rg-data-engineering-dev
  ADF_NAME:         adf-data-260524-dev

jobs:
  deploy:
    name: Deploy ARM template to Azure ADF
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the adf_publish branch (contains ARMTemplateForFactory.json)
      - name: Checkout adf_publish branch
        uses: actions/checkout@v4
        with:
          ref: adf_publish

      # 2. Log in to Azure using Service Principal stored in GitHub secret
      #    Secret format (JSON):
      #    {
      #      "clientId":       "<SP_CLIENT_ID>",
      #      "clientSecret":   "<SP_CLIENT_SECRET>",
      #      "subscriptionId": "dc003f8b-ecbb-4bd5-a698-e8208a2efc06",
      #      "tenantId":       "2200ade3-19f4-434e-be4c-ba28f9269dc3"
      #    }
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 3. Stop any ADF triggers before deployment (prevents pipeline conflicts)
      - name: Stop ADF triggers
        run: |
          az datafactory trigger list \
            --factory-name $ADF_NAME \
            --resource-group $RESOURCE_GROUP \
            --query "[?properties.runtimeState=='Started'].name" \
            --output tsv | \
          xargs -I {} az datafactory trigger stop \
            --factory-name $ADF_NAME \
            --resource-group $RESOURCE_GROUP \
            --name {}
          echo "✅ Triggers stopped"

      # 4. Deploy the ARM template generated by ADF Studio
      - name: Deploy ADF ARM template
        uses: azure/arm-deploy@v2
        with:
          resourceGroupName: ${{ env.RESOURCE_GROUP }}
          template: ARMTemplateForFactory.json
          parameters: ARMTemplateParametersForFactory.json
          deploymentName: adf-deploy-${{ github.run_number }}

      # 5. Restart triggers after deployment
      - name: Restart ADF triggers
        run: |
          az datafactory trigger list \
            --factory-name $ADF_NAME \
            --resource-group $RESOURCE_GROUP \
            --query "[].name" \
            --output tsv | \
          xargs -I {} az datafactory trigger start \
            --factory-name $ADF_NAME \
            --resource-group $RESOURCE_GROUP \
            --name {}
          echo "✅ Triggers restarted"

      # 6. Confirm deployment
      - name: Verify deployment
        run: |
          az datafactory show \
            --name $ADF_NAME \
            --resource-group $RESOURCE_GROUP \
            --query "{name:name, state:properties.provisioningState}" \
            --output table
          echo "✅ ADF deployment complete"
